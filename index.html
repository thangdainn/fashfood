<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Example</title>
    <script>
        // Product class
        class Product {
            constructor(id, name, price, quantity) {
                this.id = id;
                this.name = name;
                this.price = price;
                this.quantity = quantity;
            }

            // Calculate total price for this product
            totalPrice() {
                return this.price * this.quantity;
            }

            // Display product details
            displayProduct() {
                return `${this.name} (x${this.quantity}) - $${this.totalPrice().toFixed(2)}`;
            }
        }

        // Cart class
        class Cart {
            constructor() {
                this.products = [];
            }

            // Add a product to the cart
            addProduct(product) {
                const existingProduct = this.products.find(p => p.id === product.id);
                if (existingProduct) {
                    existingProduct.quantity += product.quantity;
                } else {
                    this.products.push(product);
                }
            }

            // Remove a product from the cart by ID
            removeProduct(id) {
                this.products = this.products.filter(p => p.id !== id);
            }

            // Calculate total cost of all products in the cart
            calculateTotal() {
                return this.products.reduce((total, product) => total + product.totalPrice(), 0);
            }

            // Display cart details
            displayCart() {
                const cartOutput = document.getElementById("cart-output");
                cartOutput.innerHTML = ""; // Clear previous output

                if (this.products.length === 0) {
                    cartOutput.innerHTML = "Cart is empty.";
                } else {
                    cartOutput.innerHTML = "<strong>Shopping Cart:</strong><br>";
                    this.products.forEach(product => {
                        cartOutput.innerHTML += product.displayProduct() + "<br>";
                    });
                    cartOutput.innerHTML += `<strong>Total: $${this.calculateTotal().toFixed(2)}</strong>`;
                }
            }

            // Simulate checkout process
            checkout() {
                return new Promise((resolve, reject) => {
                    if (this.products.length === 0) {
                        reject("Cart is empty. Cannot proceed to checkout.");
                    } else {
                        const cartOutput = document.getElementById("cart-output");
                        cartOutput.innerHTML += "<br>Processing checkout...<br>";
                        setTimeout(() => {
                            resolve(`Checkout complete! Total: $${this.calculateTotal().toFixed(2)}`);
                        }, 2000); // Simulate 2-second delay
                    }
                });
            }
        }

        // Function to run the shopping cart example
        function runShoppingCart() {
            const cart = new Cart();
            const product1 = new Product(1, "Laptop", 1200, 1);
            const product2 = new Product(2, "Phone", 800, 2);
            const product3 = new Product(3, "Headphones", 150, 3);

            // Add products to the cart
            cart.addProduct(product1);
            cart.addProduct(product2);
            cart.addProduct(product3);

            // Display the cart
            cart.displayCart();

            // Remove a product (Phone)
            cart.removeProduct(2);
            cart.displayCart();

            // Checkout process
            cart.checkout()
                .then(message => {
                    const cartOutput = document.getElementById("cart-output");
                    cartOutput.innerHTML += "<br>" + message;
                })
                .catch(error => {
                    const cartOutput = document.getElementById("cart-output");
                    cartOutput.innerHTML += "<br>" + error;
                });
        }
    </script>
</head>
<body onload="runShoppingCart()">
    <h1>Shopping Cart Example</h1>
    <div id="cart-output"></div>
</body>
</html>
